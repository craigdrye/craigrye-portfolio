<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Municipal Risk Explorer | AlphaEngine v2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="header">
        <h1>NATIONAL MUNICIPAL RISK HUB v3</h1>
        
        <div class="controls-group">
            <div class="metric-switcher" style="margin-right: 15px;">
                <button class="metric-btn active" data-metric="min">Worst Bond (Ann.)</button>
                <button class="metric-btn" data-metric="mean">Annualized Avg</button>
                <button class="metric-btn" data-metric="median">Annualized Median</button>
                <button class="metric-btn" data-metric="count">Bond Count</button>
            </div>

            <div class="metric-switcher" id="layer-switcher" style="margin-right: 15px;">
                <button class="layer-btn active" data-layer="county">County Grid</button>
                <button class="layer-btn" data-layer="state">State Entities</button>
            </div>

            <select id="horizon-select" class="premium-select">
                <option value="modern">Modern Risk (2015+)</option>
                <option value="archive">Full Archive (2005+)</option>
            </select>

            <select id="sector-select" class="premium-select">
                <option value="all">All Sectors</option>
                <option value="Education">Education</option>
                <option value="General Obligation">General Obligation</option>
                <option value="Utility">Utility</option>
                <option value="Transportation">Transportation</option>
                <option value="Healthcare">Healthcare</option>
            </select>
        </div>
    </header>

    <main id="main-container">
        <div id="maps-wrapper" style="display: flex; flex-direction: row; gap: 4px; width: 100%;">
            <div style="flex: 1; min-height: 500px; position: relative;">
                <div id="map-container" style="height: 100%; width: 100%;"></div>
            </div>
            <div style="flex: 1; min-height: 500px; position: relative; border-left: 1px solid #1e293b;">
                <div id="fema-map-container" style="height: 100%; width: 100%;"></div>
            </div>
        </div>
        
        <div id="data-intelligence-badge" class="status-badge">
            <div class="dot pulse"></div>
            <span id="badge-text">Analyzing 37,117 National Bonds | 881 Counties</span>
        </div>
    </main>
    
    <section id="macro-charts-section" style="display: flex; gap: 20px; padding: 10px 20px; background-color: #0f172a; border-top: 1px solid #1e293b;">
        <div id="chart-issuance-count" style="flex: 1; height: 180px;"></div>
        <div id="chart-issuance-value" style="flex: 1; height: 180px;"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
